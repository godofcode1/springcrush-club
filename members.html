<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Members | Springcrush Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="config.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#members">Skip to studio</a>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Springcrush home"><span class="brand-mark">SC</span><span>Springcrush</span></a>
      <nav class="nav" aria-label="Main navigation">
        <a href="gallery.html">Gallery</a>
        <a href="submit.html">Submit</a>
        <a href="members.html">Members</a>
        <a href="admin.html" data-admin-link hidden>Admin</a>
      </nav>
      <button class="icon-button menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false"><span aria-hidden="true"></span></button>
    </header>

    <main id="members" class="section split">
      <div class="section-copy">
        <p class="eyebrow">Member studio</p>
        <h1 class="page-title">Your submissions</h1>
        <p>Edit your own work any time. Every edit returns the piece to pending review.</p>
      </div>
      <div class="panel">
        <form class="form" data-art-form>
          <input type="hidden" name="artwork_id" />
          <label>Piece title<input type="text" name="title" maxlength="80" required /></label>
          <label>Artist name<input type="text" name="artist_name" maxlength="80" required /></label>
          <label>Short description<textarea name="description" rows="4" maxlength="500"></textarea></label>
          <label>Artwork image<input type="file" name="image" accept="image/png,image/jpeg,image/webp" /></label>
          <button class="button primary full" type="submit">Submit for review</button>
          <button class="button text full" type="button" data-cancel-edit hidden>Cancel edit</button>
        </form>
        <div class="submission-list" data-my-submissions></div>
      </div>
    </main>

    <div class="toast" data-toast role="status" aria-live="polite"></div>
  </body>
</html>
