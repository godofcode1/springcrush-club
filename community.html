<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Community | Springcrush Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="config.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#community">Skip to community</a>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Springcrush home"><span class="brand-mark">SC</span><span>Springcrush</span></a>
      <nav class="nav" aria-label="Main navigation">
        <a href="gallery.html">Gallery</a>
        <a href="community.html">Community</a>
        <a href="competition.html">Competitions</a>
        <a href="submit.html">Submit</a>
        <a href="members.html">Members</a>
        <a href="admin.html" data-admin-link hidden>Admin</a>
      </nav>
      <button class="icon-button menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false"><span aria-hidden="true"></span></button>
    </header>

    <main id="community" class="section">
      <div class="section-head">
        <div>
          <p class="eyebrow">Club journal</p>
          <h1 class="page-title">Community board</h1>
        </div>
      </div>
      <section class="community-grid">
        <article class="panel feature-panel">
          <p class="eyebrow">Monthly theme</p>
          <div data-monthly-theme></div>
        </article>
        <article class="panel feature-panel">
          <p class="eyebrow">Featured artist</p>
          <div data-featured-artist></div>
        </article>
      </section>

      <section class="section-lite">
        <div class="section-head">
          <div>
            <p class="eyebrow">Event photo albums</p>
            <h2>Picnic-table memories</h2>
          </div>
        </div>
        <div class="gallery-grid" data-albums></div>
      </section>


      <section class="section-lite">
        <div class="section-head">
          <div>
            <p class="eyebrow">Member profiles</p>
            <h2>Artists in the club</h2>
          </div>
        </div>
        <div class="submission-list" data-public-profiles></div>
      </section>
    </main>

    <div class="toast" data-toast role="status" aria-live="polite"></div>
  </body>
</html>
