<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery | Springcrush Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="config.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#gallery">Skip to gallery</a>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Springcrush home"><span class="brand-mark">SC</span><span>Springcrush</span></a>
      <nav class="nav" aria-label="Main navigation">
        <a href="gallery.html">Gallery</a>
        <a href="submit.html">Submit</a>
        <a href="members.html">Members</a>
        <a href="admin.html" data-admin-link hidden>Admin</a>
      </nav>
      <button class="icon-button menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false"><span aria-hidden="true"></span></button>
    </header>

    <main id="gallery" class="section">
      <div class="section-head">
        <div>
          <p class="eyebrow">Public gallery</p>
          <h1 class="page-title">Approved pieces</h1>
        </div>
        <span class="status-pill" data-live-status>Demo mode</span>
      </div>
      <div class="reference-strip" aria-label="Spring mood references">
        <span>pressed flowers</span>
        <span>sketchbook pages</span>
        <span>soft grass</span>
        <span>paint studies</span>
      </div>
      <div class="gallery-grid" data-gallery></div>
    </main>

    <div class="toast" data-toast role="status" aria-live="polite"></div>
  </body>
</html>
